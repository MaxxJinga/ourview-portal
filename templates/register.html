<!DOCTYPE html>
<html>
<head>
    <title>Register - School Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-3xl shadow-xl w-96 border border-slate-100">
        <h2 class="text-2xl font-bold text-slate-800 mb-6 text-center">Create Account</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="p-4 rounded-xl mb-4 text-sm font-bold border 
                  {{ 'bg-green-100 border-green-400 text-green-700' if category == 'success' else 'bg-red-100 border-red-400 text-red-700' }}">
                {{ '✅' if category == 'success' else '⚠️' }} {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" id="registrationForm">
            <input type="text" name="username" placeholder="Username" required 
                   class="w-full p-3 mb-4 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400 text-sm">
            
            <input type="email" name="email" placeholder="Email (example@gmail.com)" required 
                   class="w-full p-3 mb-4 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400 text-sm">

            <div class="relative mb-1">
                <input type="password" name="password" id="password" placeholder="Password" required 
                       oninput="checkStrength(this.value)"
                       class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400 text-sm">
                <button type="button" onclick="togglePassword('password', 'eye-1')" 
                        class="absolute right-3 top-3 text-slate-400 hover:text-indigo-600 focus:outline-none">
                    <span id="eye-1">👁️</span>
                </button>
            </div>

            <div class="w-full bg-slate-100 h-1.5 rounded-full mb-4 overflow-hidden">
                <div id="strength-bar" class="h-full w-0 transition-all duration-300 bg-red-500"></div>
            </div>
            <p id="strength-text" class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-4 px-1">Strength: Weak</p>

            <div class="relative mb-4">
                <input type="password" id="confirm_password" placeholder="Confirm Password" required 
                       class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400 text-sm">
                <button type="button" onclick="togglePassword('confirm_password', 'eye-2')" 
                        class="absolute right-3 top-3 text-slate-400 hover:text-indigo-600 focus:outline-none">
                    <span id="eye-2">👁️</span>
                </button>
            </div>
            
            <select name="role" class="w-full p-3 mb-6 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400 bg-white text-sm">
                <option value="student">I am a Student</option>
                <option value="teacher">I am a Teacher</option>
            </select>
            
            <button type="submit" class="w-full bg-indigo-600 text-white p-3 rounded-xl font-bold hover:bg-indigo-700 transition shadow-lg active:scale-95">
                Register
            </button>
        </form>

        <p class="text-center text-slate-500 text-sm mt-4">
            Already have an account? <a href="/login" class="text-indigo-600 font-bold hover:underline">Login</a>
        </p>
    </div>

    <script>
    // 1. Toggle Visibility
    function togglePassword(fieldId, eyeId) {
        const input = document.getElementById(fieldId);
        const eye = document.getElementById(eyeId);
        input.type = input.type === 'password' ? 'text' : 'password';
        eye.innerText = input.type === 'password' ? '👁️' : '🙈';
    }

    // 2. Strength Checker Logic
    function checkStrength(password) {
        const bar = document.getElementById('strength-bar');
        const text = document.getElementById('strength-text');
        let strength = 0;

        if (password.length >= 6) strength++;
        if (password.length >= 10) strength++;
        if (/[A-Z]/.test(password)) strength++;
        if (/[0-9]/.test(password)) strength++;
        if (/[^A-Za-z0-9]/.test(password)) strength++;

        // Visual updates
        const colors = ['bg-red-500', 'bg-orange-500', 'bg-yellow-500', 'bg-blue-500', 'bg-green-500'];
        const labels = ['Weak', 'Fair', 'Good', 'Strong', 'Excellent'];
        const widths = ['20%', '40%', '60%', '80%', '100%'];

        bar.className = `h-full transition-all duration-300 ${colors[strength-1] || 'bg-red-500'}`;
        bar.style.width = widths[strength-1] || '0%';
        text.innerText = `Strength: ${labels[strength-1] || 'Weak'}`;
        text.className = `text-[10px] font-bold uppercase tracking-widest mb-4 px-1 ${strength >= 4 ? 'text-green-600' : 'text-slate-400'}`;
    }

    // 3. Match Validation
    document.getElementById('registrationForm').addEventListener('submit', function(e) {
        const pass = document.getElementById('password').value;
        const conf = document.getElementById('confirm_password').value;
        if (pass !== conf) {
            e.preventDefault();
            alert("⚠️ Passwords don't match!");
        }
    });
    </script>
</body>
</html>
